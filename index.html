<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Gamer</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <header>
       <h1>Wiki Gamer</h1>
        <p class="subtitle">Discover your next favorite game</p>

        <form id="search-form">
            <input type="text" id="search-input" placeholder="Search game...">
            <button type="submit">Search</button>
        </form>
    </header>

    <main>
        <section id="games-container"></section>
    </main>

    <div id="modal" class="modal hidden">

        <div class="modal-content">

            <button id="close-modal"> ✖ </button>

            <div id="modal-body">

            </div>

        </div>

    </div>

    <script src="./script.js"></script>

</body>

</html>
